<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Reading Time!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">


<style>
body{
    font-family: 'IBM Plex Mono', monospace;
    background:#fffffa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* ===== Card ===== */
.card{
    background:white;
    width:calc(100% - 5cm); /* ซ้าย 6cm + ขวา 6cm */
    max-width:900px;        /* กันไม่ให้ใหญ่เกินไปในจอใหญ่ */
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    text-align:center;
}

/* ===== Title ===== */
h1{
    margin:0 0 25px 0;
    font-weight:600;
    color:#43302e;
}

/* ===== Goal Section ===== */
.goal-section{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

input{
    padding:8px;
    border-radius:8px;
    border:1px solid #eee;
    width:90px;
    text-align:center;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#f0f0f0;
    color:#43302e;
    transition:0.2s;
}

button:hover{
    background:#e6e6e6;
}

/* ===== Progress ===== */
.progress-container{
    width:100%;
    height:12px;
    background:#f5f9fc;
    margin:20px 0;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#43302e;
    transition:width 1s linear;
}

/* ===== Timer ===== */
#timer{
    font-size:52px;
    margin:20px 0;
    font-weight:600;
    color:#43302e;
}

/* ===== Toggle Button ===== */
.toggle{
    width:75px;
    height:75px;
    border-radius:50%;
    font-size:30px;
    border:none;
    background:#ffe2eb;
    color:#43302e;
    cursor:pointer;
    transition:0.2s;
    margin-top:10px;
}

.toggle:hover{
    background:#ffcbda;
    transform:scale(1.05);
}

/* ===== Reset ===== */
.reset-btn{
    margin-top:15px;
    font-size:13px;
    opacity:0.7;
}

/* ===== Daily Summary ===== */
.stats{
    margin-top:25px;
    font-size:14px;
    color:#43302e;
}

/* ===== Mode Switch Container ===== */
.mode-switch{
    position:fixed;
    top:20px;
    left:30px; /* ซ้ายบน */
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:#43302e;
    z-index:1000;
}

/* Hide checkbox */
.switch input{
    display:none;
}

/* Switch box */
.switch{
    position:relative;
    width:52px;
    height:26px;
}

/* Slider background */
.slider{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#562F00;
    border-radius:30px;
    transition:0.3s;
    cursor:pointer;
}

/* Circle */
.slider::before{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:0.3s;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}



input:checked + .slider::before{
    transform:translateX(26px);
}

/* Theme classes */
body.pomodoro-mode{
    background:#eaf8ff;
}

body.timer-mode{
    background:#fffffa;
}
</style>
</head>

<body>

<div class="mode-switch">
  <span class="label-left">Pomodoro</span>

  <label class="switch">
    <input type="checkbox" id="modeToggle">
    <span class="slider"></span>
  </label>

  <span class="label-right">Timer</span>
</div>

<div class="card">

<h1>Reading Time!</h1>

<div class="goal-section">
    <input type="number" id="goalInput" placeholder="min">
    <button onclick="setGoal()">Set</button>
</div>

<div id="goalStatus"></div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="timer">00:00:00</div>

<button id="toggleBtn" class="toggle" onclick="toggleTimer()">▶</button>

<div>
  <button class="reset-btn" onclick="resetTimer()">Reset</button>
</div>

<div class="stats">
daily summary: <span id="todayTotal">0</span> min
</div>

</div>
