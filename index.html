<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'IBM Plex Mono',monospace;}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#eaf8ff;
}

/* CARD */
.timer-card{
    background:#fff;
    padding:clamp(20px,4vw,35px);
    border-radius:18px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    width:100%;
    max-width:380px;
}

/* TEXT */
h1{font-size:clamp(18px,4vw,26px);margin-bottom:10px;color:#43302e;}
#mode{font-size:14px;margin-bottom:4px;}
#round{font-size:12px;margin-bottom:15px;opacity:.7;}

.time{font-size:clamp(40px,10vw,70px);font-weight:600;margin:20px 0;}

/* BUTTON */
button{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:clamp(12px,2.5vw,14px);
    margin:5px;
}

.spotify-btn{
    width:clamp(60px,15vw,80px);
    height:clamp(60px,15vw,80px);
    border-radius:50%;
    background:#eaf8ff;
}

/* SEGMENT */
.segment-container{
    display:flex;
    margin-top:15px;
    background:#f3f3f3;
    border-radius:14px;
    padding:4px;
}

.segment-container button{
    flex:1;
    background:transparent;
}

.active{background:#ffd8d8;border-radius:10px;}

/* SUMMARY */
.daily-summary{
    margin-top:20px;
    font-size:13px;
}

/* MOBILE (สำคัญสำหรับ Notion) */
@media(max-width:500px){
    body{
        transform:scale(0.92);
        transform-origin:top center;
    }

    button{width:100%;}
}
</style>
</head>

<body>

<div class="timer-card">
    <h1>🍅 Pomodoro</h1>
    <div id="mode">Study</div>
    <div id="round">Round: 1</div>
    <div id="timer" class="time">25:00</div>

    <button class="spotify-btn" onclick="toggleTimer()" id="playBtn">▶</button>

    <button onclick="resetTimer()">Reset</button>

    <div class="segment-container">
        <button class="active" onclick="changeMode('focus',this)">Study</button>
        <button onclick="changeMode('short',this)">Short</button>
        <button onclick="changeMode('long',this)">Long</button>
    </div>

    <div class="daily-summary">
        <p>Study: <span id="study">0</span> min</p>
        <p>Break: <span id="break">0</span> min</p>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDoFRKAZpexROf_an_QYxgJFQV8_9kQ-aM",
authDomain: "study-planner-5d50e.firebaseapp.com",
projectId: "study-planner-5d50e",
storageBucket: "study-planner-5d50e.firebasestorage.app",
messagingSenderId: "347624011010",
appId: "1:347624011010:web:a92370eedbce4669d6fe1b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let time=25*60;
let interval=null;
let mode="focus";

function updateDisplay(){
    let m=Math.floor(time/60);
    let s=time%60;
    document.getElementById("timer").innerText=
    `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function toggleTimer(){
    if(interval){
        clearInterval(interval);
        interval=null;
        document.getElementById("playBtn").innerText="▶";
    }else{
        interval=setInterval(run,1000);
        document.getElementById("playBtn").innerText="⏸";
    }
}

function run(){
    if(time>0){
        time--;
        updateDisplay();
    }else{
        clearInterval(interval);
        interval=null;
        addTime();
    }
}

function resetTimer(){
    clearInterval(interval);
    interval=null;
    time=getDefaultTime();
    updateDisplay();
}

function changeMode(m,el){
    mode=m;
    document.querySelectorAll(".segment-container button")
    .forEach(b=>b.classList.remove("active"));
    el.classList.add("active");

    time=getDefaultTime();
    updateDisplay();
}

function getDefaultTime(){
    if(mode==="focus") return 25*60;
    if(mode==="short") return 5*60;
    return 15*60;
}

/* FIREBASE */
async function addTime(){
    let minutes=getDefaultTime()/60;

    const today=new Date().toISOString().split("T")[0];
    const ref=doc(db,"dailySummary",today);

    const snap=await getDoc(ref);

    if(!snap.exists()){
        await setDoc(ref,{
            study: mode==="focus"?minutes:0,
            break: mode!=="focus"?minutes:0
        });
    }else{
        if(mode==="focus"){
            await updateDoc(ref,{study:increment(minutes)});
        }else{
            await updateDoc(ref,{break:increment(minutes)});
        }
    }

    loadToday();
}

async function loadToday(){
    const today=new Date().toISOString().split("T")[0];
    const ref=doc(db,"dailySummary",today);
    const snap=await getDoc(ref);

    if(snap.exists()){
        let d=snap.data();
        document.getElementById("study").innerText=d.study||0;
        document.getElementById("break").innerText=d.break||0;
    }
}

updateDisplay();
loadToday();

</script>

</body>
</html>
