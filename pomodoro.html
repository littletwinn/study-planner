<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'IBM Plex Mono', monospace;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#eaf8ff;
}

/* ===== NAVBAR ===== */
.navbar{
  height:85px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  background:#ffffff;
  box-shadow:0 4px 25px rgba(0,0,0,0.05);
}

.navbar a{
  color:#43302e;
  text-decoration:none;
  font-size:18px;
  font-weight:600;
  transition:0.3s;
}

.navbar a:hover{
  color:#ffd8d8;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== CARD ===== */
.timer-card{
  background:#ffffff;
  padding:35px 45px;   /* ลด padding */
  border-radius:18px;  /* ลดความโค้ง */
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  border:none;         /* ❌ ตัดขอบออก */
  max-width:420px;     /* ลดขนาด card */
  width:90%;
  transition:0.4s;
}

h1{
  color:#43302e;
  font-weight:600;
  margin-bottom:15px;
}

#mode{
  font-size:16px;
  margin-bottom:5px;
  color:#43302e;
}

#round{
  font-size:14px;
  margin-bottom:20px;
  opacity:0.7;
}

.time{
  font-size:70px;
  font-weight:600;
  color:#43302e;
  margin:20px 0 30px 0;
  letter-spacing:3px;
}

/* ===== TOGGLE SWITCH ===== */
.toggle-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
  font-weight:600;
  color:#43302e;
}

.toggle-switch{
  width:70px;
  height:34px;
  background:#fffcdd;
  border-radius:50px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.toggle-circle{
  width:28px;
  height:28px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:3px;
  left:4px;
  transition:0.3s;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.toggle-switch.active{
  background:#d9f2ff;
}

.toggle-switch.active .toggle-circle{
  transform:translateX(34px);
}

/* ===== BUTTONS ===== */
button{
  padding:12px 24px;
  margin:8px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  transition:0.25s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.reset-btn{
  background:#f0f0f0;
  color:#43302e;
}

.focus-btn{
  background:#ffd8d8;
  color:#43302e;
  transition:0.4s;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:#ffd8d8;
  opacity:0;
  visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  transition:opacity 0.35s ease;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

#modeFocus{
  font-size:22px;
  margin-bottom:10px;
  color:#43302e;
}

#roundFocus{
  font-size:18px;
  margin-bottom:20px;
  opacity:0.7;
}

.focus-time{
  font-size:200px;
  font-weight:600;
  color:#43302e;
  letter-spacing:5px;
}

.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  font-size:40px;
  background:none;
  border:none;
  color:#43302e;
  cursor:pointer;
}

/* ===== SEGMENT ===== */
.segment-container{
  position:relative;
  display:flex;
  width:360px;
  margin:25px auto 0;
  background:#f3f3f3;
  border-radius:18px;
  padding:6px;
  overflow:hidden;
}

.segment-btn{
  flex:1;
  border:none;
  background:transparent;
  padding:10px 0;
  font-family:inherit;
  font-weight:600;
  cursor:pointer;
  z-index:2;
  color:#43302e;
}

.segment-indicator{
  position:absolute;
  top:6px;
  left:6px;
  width:calc((100% - 12px) / 3);
  height:calc(100% - 12px);
  border-radius:14px;
  transition:0.35s cubic-bezier(.4,1.3,.6,1), background 0.3s;
  background:#ffd8d8;
  z-index:1;
}

</style>
</head>

<body>

<div class="navbar">
  <a href="index.html">HOME</a>
  <a href="pomodoro.html">POMODORO</a>
</div>

<div class="main">
  <div class="timer-card">
    <h1>Pomodoro Timer</h1>
    <div id="mode">Study</div>
    <div id="round">Round: 1</div>
    <div id="timer" class="time">25:00</div>

    <!-- ✅ TOGGLE SWITCH -->
    <div class="toggle-container">
      <span>Pause</span>
      <div class="toggle-switch" onclick="toggleTimer()" id="toggleSwitch">
        <div class="toggle-circle"></div>
      </div>
      <span>Start</span>
    </div>

    <button class="reset-btn" onclick="resetTimer()">Reset</button>
    <button class="focus-btn" onclick="openFocus()">Focus Mode</button>

    <div class="segment-container">
      <div class="segment-indicator" id="segmentIndicator"></div>

      <button class="segment-btn active"
              onclick="changeMode('focus', this, 0)">Study</button>

      <button class="segment-btn"
              onclick="changeMode('short', this, 1)">Short</button>

      <button class="segment-btn"
              onclick="changeMode('long', this, 2)">Long</button>
    </div>

  </div>
</div>

<!-- ✅ OVERLAY ครบ -->
<div id="focusOverlay" class="overlay">
  <button class="close-btn" onclick="closeFocus()">✕</button>
  <div id="modeFocus">Study</div>
  <div id="roundFocus">Round: 1</div>
  <div id="focusTimer" class="focus-time">25:00</div>
</div>

<script src="script.js"></script>
</body>
</html>
