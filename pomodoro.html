<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #eaf8ff;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            background: #ffffff;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
        }

        .navbar a {
            color: #43302e;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #ffd8d8;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== CARD ===== */
        .timer-card {
            background: #ffffff;
            padding: 35px 45px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: none;
            max-width: 420px;
            width: 90%;
            transition: 0.4s;
        }

        h1 {
            color: #43302e;
            font-weight: 600;
            margin-bottom: 15px;
        }

        #mode {
            font-size: 16px;
            margin-bottom: 5px;
            color: #43302e;
        }

        #round {
            font-size: 14px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .time {
            font-size: 70px;
            font-weight: 600;
            color: #43302e;
            margin: 20px 0 30px 0;
            letter-spacing: 3px;
        }

        /* ===== TOGGLE SWITCH ===== */
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #43302e;
        }

        .toggle-switch {
            width: 70px;
            height: 34px;
            background: #fffcdd;
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-circle {
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 4px;
            transition: 0.3s;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }

        .toggle-switch.active {
            background: #d9f2ff;
        }

        .toggle-switch.active .toggle-circle {
            transform: translateX(34px);
        }

        /* ===== BUTTONS ===== */
        button {
            padding: 12px 24px;
            margin: 8px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .reset-btn {
            background: #f0f0f0;
            color: #43302e;
        }

        .focus-btn {
            background: #ffd8d8;
            color: #43302e;
            transition: 0.4s;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: #ffd8d8;
            opacity: 0;
            visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
            transition: opacity 0.35s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #modeFocus {
            font-size: 22px;
            margin-bottom: 10px;
            color: #43302e;
        }

        #roundFocus {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .focus-time {
            font-size: 200px;
            font-weight: 600;
            color: #43302e;
            letter-spacing: 5px;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            background: none;
            border: none;
            color: #43302e;
            cursor: pointer;
        }

        /* ===== SEGMENT ===== */
        .segment-container {
            position: relative;
            display: flex;
            width: 360px;
            margin: 25px auto 0;
            background: #f3f3f3;
            border-radius: 18px;
            padding: 6px;
            overflow: hidden;
        }

        .segment-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            z-index: 2;
            color: #43302e;
        }

        .segment-indicator {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc((100% - 12px) / 3);
            height: calc(100% - 12px);
            border-radius: 14px;
            transition: 0.35s cubic-bezier(.4, 1.3, .6, 1), background 0.3s;
            background: #ffd8d8;
            z-index: 1;
        }

        .daily-summary {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #43302e;
        }

        .daily-summary h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="main">
        <div class="timer-card">
            <h1>Pomodoro Timer</h1>

            <div id="mode">Study</div>
            <div id="round">Round: 1</div>
            <div id="timer" class="time">25:00</div>

            <!-- TOGGLE -->
            <div class="toggle-container">
                <span>Pause</span>
                <div class="toggle-switch" onclick="toggleTimer()" id="toggleSwitch">
                    <div class="toggle-circle"></div>
                </div>
                <span>Start</span>
            </div>

            <button class="reset-btn" onclick="resetTimer()">Reset</button>
            <button class="focus-btn" onclick="openFocus()">Focus Mode</button>

            <!-- SEGMENT -->
            <div class="segment-container">
                <div class="segment-indicator" id="segmentIndicator"></div>
                <button class="segment-btn active" onclick="changeMode('focus', this, 0)">Study</button>
                <button class="segment-btn" onclick="changeMode('short', this, 1)">Short</button>
                <button class="segment-btn" onclick="changeMode('long', this, 2)">Long</button>
            </div>

            <div class="daily-summary">
                <h3>Today Summary</h3>
                <p>Study: <span id="todayStudy">0</span> min</p>
                <p>Break: <span id="todayBreak">0</span> min</p>
            </div>

        </div>
    </div>

    <!-- OVERLAY -->
    <div id="focusOverlay" class="overlay">
        <button class="close-btn" onclick="closeFocus()">✕</button>
        <div id="modeFocus">Study</div>
        <div id="roundFocus">Round: 1</div>
        <div id="focusTimer" class="focus-time">25:00</div>
    </div>

    

    <script src="script.js"></script>



    <script type="module">

  import { initializeApp } 
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

  import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } 
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDoFRKAZpexROf_an_QYxgJFQV8_9kQ-aM",
    authDomain: "study-planner-5d50e.firebaseapp.com",
    projectId: "study-planner-5d50e",
    storageBucket: "study-planner-5d50e.firebasestorage.app",
    messagingSenderId: "347624011010",
    appId: "1:347624011010:web:a92370eedbce4669d6fe1b",
    measurementId: "G-N4C9PVRFZY"
  };

  // Initialize
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ===== เพิ่มเวลา =====
  async function addTime(minutes, mode) {

    const today = new Date().toISOString().split("T")[0];
    const ref = doc(db, "dailySummary", today);

    const snapshot = await getDoc(ref);

    if (!snapshot.exists()) {
      await setDoc(ref, {
        study: mode === "focus" ? minutes : 0,
        break: mode !== "focus" ? minutes : 0
      });
    } else {
      if (mode === "focus") {
        await updateDoc(ref, { study: increment(minutes) });
      } else {
        await updateDoc(ref, { break: increment(minutes) });
      }
    }

    loadToday();
  }

  // ===== โหลดข้อมูลวันนี้ =====
  async function loadToday() {
    const today = new Date().toISOString().split("T")[0];
    const ref = doc(db, "dailySummary", today);
    const snapshot = await getDoc(ref);

    if (snapshot.exists()) {
      const data = snapshot.data();
      document.getElementById("todayStudy").innerText = data.study || 0;
      document.getElementById("todayBreak").innerText = data.break || 0;
    }
  }

  loadToday();

  // ทำให้เรียกจาก script เดิมได้
  window.addTime = addTime;

</script>

</body>
</html>
